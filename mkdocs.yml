site_name: CheckAgent
site_description: The open-source testing framework for AI agents
site_url: https://xydac.github.io/checkagent
repo_url: https://github.com/xydac/checkagent
repo_name: xydac/checkagent

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_style: google
            merge_init_into_class: true
            show_if_no_docstring: false
            signature_crossrefs: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Testing Layers:
    - Overview: layers/index.md
    - Mock: layers/mock.md
    - Replay: layers/replay.md
    - Eval: layers/eval.md
    - Judge: layers/judge.md
  - Guides:
    - Safety Testing: guides/safety.md
    - Fault Injection: guides/faults.md
    - Multi-Agent Testing: guides/multiagent.md
  - API Reference:
    - Overview: api/index.md
    - Core Types: api/types.md
    - Mock Layer: api/mock.md
    - Eval & Assertions: api/eval.md
    - Safety: api/safety.md
    - Adapters: api/adapters.md
    - Replay: api/replay.md
    - Judge: api/judge.md
  - CLI Reference: cli.md
  - Configuration: configuration.md
  - GitHub Action: github-action.md
  - OWASP Mapping: owasp-mapping.md
  - Badges: badge.md
  - Limitations: limitations.md
